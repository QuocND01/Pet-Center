version: '3.8'

services:

  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      - attendance-api 
      - booking-api 
      - bookingservice-api 
      - cart-api 
      - customer-api 
      - feedback-api 
      - import-api 
      - inventory-api 
      - medical-api 
      - order-api 
      - payroll-api 
      - petcenterclient-api 
      - product-api 
      - staff-api 
      - voucher-api 
    networks:
      - backend 
  attendance-api:
    build:
      context: .
      dockerfile: AttendanceAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5001:80"
    networks:
      - backend


  booking-api:
    build:
      context: .
      dockerfile: BookingAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5002:80"
    networks:
      - backend

  bookingservice-api:
    build:
      context: .
      dockerfile: BookingServiceAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5003:80"
    networks:
      - backend

  cart-api:
    build:
      context: .
      dockerfile: CartAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5004:80"
    networks:
      - backend

  customer-api:
    build:
      context: .
      dockerfile: CustomerAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5005:80"
    networks:
      - backend

  feedback-api:
    build:
      context: .
      dockerfile: FeedbackAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5006:80"
    networks:
      - backend

  import-api:
    build:
      context: .
      dockerfile: ImportAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5007:80"
    networks:
      - backend

  inventory-api:
    build:
      context: .
      dockerfile: InventoryAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5008:80"
    networks:
      - backend

  medical-api:
    build:
      context: .
      dockerfile: MedicalAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5009:80"
    networks:
      - backend

  order-api:
    build:
      context: .
      dockerfile: OrdersAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5010:80"
    networks:
      - backend

  payroll-api:
    build:
      context: .
      dockerfile: PayrollAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5011:80"
    networks:
      - backend

  petcenterclient-api:
    build:
      context: .
      dockerfile: PetCenterClient/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5012:80"
    networks:
      - backend

  product-api:
    build:
      context: .
      dockerfile: ProductAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5013:80"
    networks:
      - backend

  staff-api:
    build:
      context: .
      dockerfile: StaffAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5014:80"
    networks:
      - backend

  voucher-api:
    build:
      context: .
      dockerfile: VoucherAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5015:80"
    networks:
      - backend

networks:
  backend: